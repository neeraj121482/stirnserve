<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stir n Serve | Homemade Snacks, Sweets & Pickles</title>
  <meta name="description" content="Premium homemade Indian snacks, sweets, pickles and hampers by Stir n Serve." />
  <link rel="icon" data-favicon href="assets/brand/favicon.png" />
  <link rel="stylesheet" href="style.css" />
</head><body data-page="home">
  <div class="topbar" data-topbar></div>
  <header class="header">
    <div class="container nav">
      <a class="brand" href="index.html"><img class="logo-img" data-image-key="logo" alt="Stir n Serve logo"><span data-brand-name></span></a>
      <nav class="menu" id="menu" data-nav></nav>
      <div class="actions"><button class="btn outline" onclick="openCart()"><span data-content="global.cartLabel"></span> <span data-cart-count>0</span></button><button class="btn primary" onclick="openWhatsApp('Hi Stir n Serve, I want to place an order.')" data-content="global.whatsappLabel"></button><button class="hamburger" onclick="toggleMenu()">☰</button></div>
    </div>
  </header>

  <main>
    <section class="hero"><div class="container hero-grid"><div class="reveal"><span class="eyebrow" data-tagline></span><h1 data-page-title></h1><p data-page-subtitle></p><div class="hero-buttons" data-home-buttons></div><div class="trust" data-home-trust></div></div><div class="hero-visual reveal"><img data-page-hero-image alt="Stir n Serve snacks sweets and pickles"></div></div></section>
    <section class="section slim"><div class="container"><div class="section-head"><span class="eyebrow" data-content="pages.home.categoriesTitle"></span><h2 data-content="pages.home.categoriesTitle"></h2><p data-content="pages.home.categoriesText"></p></div><div class="grid categories stagger" data-home-categories></div></div></section>
    <section class="section alt"><div class="container"><div class="section-head"><span class="eyebrow" data-content="pages.home.favouritesEyebrow"></span><h2 data-content="pages.home.favouritesTitle"></h2><p data-content="pages.home.favouritesText"></p></div><div class="grid product-grid stagger" data-products data-limit="6"></div></div></section>
    <section class="section"><div class="container story-grid"><div class="story-img reveal"><img data-image-key="logo" alt="Stir n Serve logo"></div><div class="story-content reveal"><span class="eyebrow" data-content="pages.home.storyEyebrow"></span><h2 data-content="pages.home.storyTitle"></h2><div data-home-story-paragraphs></div><a class="btn primary" href="our-story.html" data-content="pages.home.storyButton"></a></div></div></section>
    <section class="section dark"><div class="container"><div class="section-head"><span class="eyebrow" data-content="pages.home.hamperEyebrow"></span><h2 data-content="pages.home.hamperTitle"></h2><p data-content="pages.home.hamperText"></p><br><a class="btn light" href="gift-hampers.html" data-content="pages.home.hamperButton"></a></div></div></section>
    <section class="section"><div class="container"><div class="section-head"><span class="eyebrow" data-content="pages.home.reelsEyebrow"></span><h2 data-content="pages.home.reelsTitle"></h2><p data-content="pages.home.reelsText"></p></div><div class="grid reel-strip stagger" data-home-reels></div></div></section>
  </main>
  <footer class="footer">
    <div class="container footer-grid">
      <div><img class="logo-img" data-image-key="logo" alt="Stir n Serve logo"><h3 data-brand-name></h3><p data-content="global.footerDescription"></p><p><strong>Address:</strong> <span data-address></span></p><p><strong>Orders:</strong> <span data-phone></span></p><p><strong>FSSAI:</strong> <span data-fssai></span></p></div>
      <div data-footer-columns></div>
    </div>
    <div class="container copy" data-content="global.footerCopyright"></div>
  </footer>
  <a class="floating-wa" target="_blank" href="#">☎</a>
  <div class="overlay" id="overlay" onclick="closeCart()"></div>
  <aside class="cart-drawer" id="cartDrawer"><div class="cart-head"><h3>Your Cart</h3><button class="close" onclick="closeCart()">×</button></div><div class="cart-items" id="cartItems"></div><div class="cart-foot"><div class="discount"><input id="discountCode" placeholder="Discount code"><button class="btn outline small" onclick="applyDiscount()">Apply</button></div><div class="cart-total"><span>Subtotal</span><span id="cartSubtotal">₹0</span></div><div class="cart-total"><span>Discount</span><span id="cartDiscount">₹0</span></div><div class="cart-total"><span>Total</span><span id="cartTotal">₹0</span></div><button class="btn primary" onclick="cartWhatsApp()">Confirm on WhatsApp</button><button class="btn outline" onclick="clearCart()">Clear Cart</button></div></aside>
  <script>window.SNS_BASE = "";</script>
  <script src="site-content.js"></script>
  <script src="products.js"></script>
  <script src="script.js"></script>
</body>
</html>
